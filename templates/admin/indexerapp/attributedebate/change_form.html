{% extends "admin/change_form.html" %}

{% load admin_urls i18n %}

{% block object-tools-items %}
{% if change and not is_popup %}
<li>
    <a href="{% url opts|admin_urlname:'history' original.uuid|admin_urlquote %}" class="historylink">{% translate "History" %}</a>
</li>
{% if has_delete_permission %}
<li>
    <a href="{% url opts|admin_urlname:'delete' original.uuid|admin_urlquote %}" class="deletelink">{% translate "Delete" %}</a>
</li>
{% endif %}
{% endif %}
{% endblock %}
