<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>


<script src="/static/js/ms_edition_visualizations.js"></script>
<script src="/static/js/ms_edition_graph.js"></script>

<div x-init="ms_edition_graph_init()" class="px-2">
    <h1 class="text-[#0d1b2a] text-[32px] sm:text-[40pt] caudex-bold text-left mt-4 mb-3">Automatic rites comparison </h1>

    <div class="flex my-1 flex-wrap items-center justify-center md:justify-normal gap-3">
        <label for="ms_select">Manuscripts:</label>
        <select class="manuscript_filter" name="state" id="ms_select" multiple>
        </select>

        <p class="text-sm text-gray-600">(you can choose multiple manuscripts!)</p>

        <div class="flex items-center gap-2 min-w-[320px]">
            <label class="ml-2" for="editionChartTypeSelect">Diagram type:</label>
            <select id="editionChartTypeSelect" class="min-w-[280px]" style="width: 280px;">
                <option value="parallel">Parallel Coordinates Plot</option>
                <option value="dot_matrix">Dot Plot Matrix</option>
                <option value="circos">Circos Plot</option>
                <option value="sankey">Sankey Diagram</option>
            </select>
        </div>

    </div>

    <div id="chart" class="overflow-x-auto"></div>

    <div class="flex flex-wrap gap-2 mt-3 mb-4">
        <span class="text-sm font-semibold text-gray-600 self-center">Export graph:</span>
        <button onclick="exportEditionSvg()"
            class="py-1 px-4 bg-[#795a42] hover:bg-[#997a62] text-white font-semibold rounded drop-shadow text-sm">
            SVG
        </button>
        <button onclick="exportEditionPng()"
            class="py-1 px-4 bg-[#795a42] hover:bg-[#997a62] text-white font-semibold rounded drop-shadow text-sm">
            PNG
        </button>
        <span class="text-sm font-semibold text-gray-600 self-center ml-2">Export data:</span>
        <button onclick="exportEditionJson()"
            class="py-1 px-4 bg-[#795a42] hover:bg-[#997a62] text-white font-semibold rounded drop-shadow text-sm">
            JSON
        </button>
        <button onclick="exportEditionCsv()"
            class="py-1 px-4 bg-[#795a42] hover:bg-[#997a62] text-white font-semibold rounded drop-shadow text-sm">
            CSV
        </button>
    </div>

</div>
